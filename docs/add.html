<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Item</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Add a new free item</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="list.html">List</a>
        </nav>
    </header>

    <main>
        <section class="form-card">
            <p id="coords"></p>
            <form id="add-form">
                <label>
                    Type
                    <select name="entryType" id="entryType">
                        <option value="coffee">coffee</option>
                        <option value="alcohol">alcohol</option>
                        <option value="event">event</option>
                        <option value="food">food</option>
                        <option value="flyers">flyers</option>
                        <option value="other">other</option>
                    </select>
                </label>
                <label>
                    Description
                    <input type="text" name="entryDescr" id="entryDescr" minlength="5" required>
                </label>
                <button type="submit" id="submit-button">Submit</button>
            </form>
            <div id="message" class="status"></div>
        </section>
    </main>

    <footer>
        <p>2026, Gernot Lepschy | <a href="mailto:gernotdev282@gmail.com">gernotdev282@gmail.com</a></p>
    </footer>

    <script src="script.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', function() {
            initAddPage();
        });
    </script>
</body>
</html>
